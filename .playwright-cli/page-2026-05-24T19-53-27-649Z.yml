        - generic [ref=e278]:
          - heading "Aplicação do Método da Universidade de Auckland na identificação da Contribuição da Universidade de Aveiro para os ODS através da oferta formativa" [level=2] [ref=e281]
          - generic [ref=e283]:
            - generic [ref=e285]:
              - link "Indústria, inovação e infraestruturas" [ref=e287] [cursor=pointer]:
                - /url: https://sdgs.un.org/goals/goal9
                - img [ref=e288]
              - link "Produção e Consumo Sustentáveis" [ref=e291] [cursor=pointer]:
                - /url: https://sdgs.un.org/goals/goal12
                - img [ref=e292]
              - link "Ação Climática" [ref=e295] [cursor=pointer]:
                - /url: https://sdgs.un.org/goals/goal13
                - img [ref=e296]
            - generic [ref=e298]:
              - generic [ref=e300]:
                - paragraph [ref=e301]: Os 17 Objetivos de Desenvolvimento Sustentável (ODS) traduzem o apelo universal para acabar com a pobreza, proteger o planeta, e garantir paz e prosperidade para todos, até 2030. Alinhada a estes objetivos globais, a Universidade de Aveiro (UA) adotou o Mapeamento de Palavras-chave dos ODS, desenvolvido pela Universidade de Auckland, na Nova Zelândia, para identificar correspondências na oferta formativa.
                - paragraph [ref=e302]: Ao mapear os ODS na oferta formativa, a UA visa informar e sensibilizar os estudantes para questões reais e atuais, capacitando-os e envolvendo-os ativamente no desenvolvimento sustentável. A análise do contributo da oferta formativa para os ODS permitirá ainda promover a melhoria contínua do processo de ensino-aprendizagem.
                - paragraph [ref=e303]: O método consiste na mineração de palavras-chave, predefinidas e validadas, no texto descritivo da oferta formativa que consta no portal da UA. A redação do texto é da responsabilidade do respetivo diretor de curso, estando o método automatizado para a atualização dos ODS em função da edição do texto.
              - generic [ref=e304]:
                - generic [ref=e306]:
                  - paragraph [ref=e307]: Na aplicação do método, há que diferenciar o contributo da Instituição de Ensino Superior (IES) Universidade de Aveiro para os ODS e a contribuição parcelar da sua oferta formativa para o todo. Neste contexto, o ODS 4, que se centra na educação de qualidade, assume grande relevância para a UA, enquanto IES, e é refletido primeiramente nos cursos destinados à formação de novos professores, independentemente de todos os cursos promoverem um ensino de qualidade. O ODS 8, que promove crescimento económico sustentado, emprego pleno e produtivo, e trabalho digno para todos, está associado a cursos diretamente relacionados com o crescimento económico e o emprego, garantindo uma integração relevante e impactante, não obstante toda a formação preparar os estudantes para o mercado de trabalho. O ODS 17, que se foca em parcerias, não está incluído no método de mapeamento, pois apresenta-se como facilitador para a implementação dos restantes 16 objetivos.
                  - paragraph [ref=e308]: A adoção do Mapeamento dos ODS pela Universidade de Aveiro representa um passo transformador para um ambiente académico mais sustentável e responsável. Esta iniciativa posiciona a universidade na divulgação da integração da sustentabilidade na sua oferta formativa, preparando os estudantes para fazerem escolhas informadas e serem contribuidores proativos para um futuro sustentável.
                - generic [ref=e309]:
