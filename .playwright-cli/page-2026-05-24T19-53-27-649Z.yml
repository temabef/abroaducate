          - heading "Mestrado em Engenharia Aeroespacial" [level=1] [ref=e130]
          - generic [ref=e131]:
            - generic [ref=e132]:
              - generic [ref=e133]:
                - paragraph [ref=e134]: O Mestrado em Engenharia Aeroespacial da Universidade de Aveiro visa proporcionar formação avançada e multidisciplinar a licenciados em Engenharia que se pretendam inserir em indústrias tecnológicas do setor aeroespacial. O programa de estudos prevê uma formação sólida de princípios fundamentais de engenharia, como mecânica, ciência dos materiais, eletrónica e gestão de projetos, dotando assim os seus diplomados de competências de planeamento e execução de projetos aeroespaciais de forma crítica, eficiente e sustentável.
                - paragraph [ref=e135]: "Esta filosofia está patente tanto na base curricular comum como nas três áreas de especialização disponíveis: Estruturas e Sistemas de Engenharia, que explora a projeto estrutural e aerodinâmico de veículos e estruturas; Eletrónica Aeroespacial, que desenvolve sistemas eletrónicos energeticamente eficientes e de alta confiabilidade para o Espaço; e Design de Materiais e Dispositivos, que aborda práticas sustentáveis de manufatura e inovação em materiais aeroespaciais."
                - paragraph [ref=e136]: A estrutura do curso, com uma formação teórica e prática robusta, prepara engenheiros capazes de contribuir de forma inovadora para desafios globais, promovendo parcerias com a indústria e centros de...
