<!DOCTYPE html>
<html lang="en">
	<head>

		<!-- Google AdSense moved to AdBootstrap for conditional loading (free users only) -->

		<!-- Google Analytics -->
		<script async src="https://www.googletagmanager.com/gtag/js?id=G-L0SKBY98GT"></script>
		<script>
			window.dataLayer = window.dataLayer || [];
			function gtag(){dataLayer.push(arguments);}
			gtag('js', new Date());
			gtag('config', 'G-L0SKBY98GT', {
				page_title: document.title,
				page_location: window.location.href,
			});
		</script>

		<meta charset="utf-8" />
		<!-- Google Search Console Verification -->
		<meta name="google-site-verification" content="NZ2WOlXg6OIja8FPDe5eMc8ww5jvb1HeeaZx_iHHsII" />
		
		<!-- Additional SEO Meta Tags for Better Authority -->
		<meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
		<meta name="author" content="Abroaducate" />
		<meta name="copyright" content="Abroaducate" />
		<meta name="language" content="English" />
		<meta name="revisit-after" content="7 days" />
		<meta name="distribution" content="global" />
		<meta name="rating" content="general" />
		<meta name="theme-color" content="#1E40AF" />
		
		<!-- Structured Data for Better SEO -->
		<script type="application/ld+json">
		{
			"@context": "https://schema.org",
			"@type": "WebSite",
			"name": "Abroaducate",
			"url": "https://abroaducate.com",
			"description": "AI-powered academic application platform helping students worldwide achieve their study abroad dreams",
			"potentialAction": {
				"@type": "SearchAction",
				"target": "https://abroaducate.com/universities?search={search_term_string}",
				"query-input": "required name=search_term_string"
			},
			"publisher": {
				"@type": "Organization",
				"name": "Abroaducate",
				"url": "https://abroaducate.com",
				"logo": {
					"@type": "ImageObject",
					"url": "https://abroaducate.com/logo.svg"
				}
			},
			"sameAs": [
				"https://twitter.com/abroaducate",
				"https://linkedin.com/company/abroaducate"
			]
		}
		</script>
		
		<!-- Updated favicon links for custom branding -->
		<link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/favicon-32x32.svg" sizes="32x32" />
		<link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/favicon-16x16.svg" sizes="16x16" />
		<link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/favicon-192x192.svg" sizes="192x192" />
		<link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/favicon-512x512.svg" sizes="512x512" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/apple-touch-icon.svg" sizes="180x180" />
		<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		%sveltekit.head%
		
		<!-- CSS Stability Fix -->
		<style>
			/* Prevent CSS from breaking during HMR */
			* {
				box-sizing: border-box;
			}	
			/* Ensure critical styles are always loaded */
			body {
				margin: 0;
				padding: 0;
				font-family:'Manrope', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
			}
			
			/* Prevent layout shifts */
			img, video, iframe {
				max-width: 100%;
				height: auto;
			}

			/* AdSense Ad Styling */
			.adsense-container {
				margin: 20px 0;
				text-align: center;
				clear: both;
			}

			.adsense-container ins {
				display: block;
				margin: 0 auto;
			}

			/* Responsive ad containers */
			@media (max-width: 768px) {
				.adsense-container {
					margin: 15px 0;
				}
			}
		</style>
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
