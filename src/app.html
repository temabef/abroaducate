<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<!-- Updated favicon links for custom branding -->
		<link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/favicon-32x32.svg" sizes="32x32" />
		<link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/favicon-16x16.svg" sizes="16x16" />
		<link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/favicon-192x192.svg" sizes="192x192" />
		<link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/favicon-512x512.svg" sizes="512x512" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/apple-touch-icon.svg" sizes="180x180" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		%sveltekit.head%
		
		<!-- CSS Stability Fix -->
		<style>
			/* Prevent CSS from breaking during HMR */
			* {
				box-sizing: border-box;
			}
			
			/* Ensure critical styles are always loaded */
			body {
				margin: 0;
				padding: 0;
				font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
			}
			
			/* Prevent layout shifts */
			img, video, iframe {
				max-width: 100%;
				height: auto;
			}
		</style>
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
