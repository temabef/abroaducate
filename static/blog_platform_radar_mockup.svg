<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" style="background:#0f172a; font-family:'Outfit', 'Inter', 'Segoe UI', sans-serif;">
  <defs>
    <!-- Shadow filter for modern cards -->
    <filter id="cardShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="badgeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Title & Caption on Top -->
  <text x="400" y="35" font-size="20" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="0.5">
    ABROADUCATE SCHOLARSHIP RADAR
  </text>
  <text x="400" y="55" font-size="11" font-weight="500" fill="#94a3b8" text-anchor="middle">
    Instantly see every scholarship matched to your specific program and university.
  </text>

  <!-- ================= BROWSER WINDOW MOCKUP ================= -->
  <g filter="url(#cardShadow)" transform="translate(40, 75)">
    <!-- Browser Frame Background -->
    <rect width="720" height="340" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5" />
    
    <!-- Browser Top Bar (Header) -->
    <rect width="720" height="35" rx="10" fill="#0f172a" />
    <!-- Round Window Controls -->
    <circle cx="20" cy="17.5" r="5" fill="#ef4444" />
    <circle cx="35" cy="17.5" r="5" fill="#eab308" />
    <circle cx="50" cy="17.5" r="5" fill="#22c55e" />
    
    <!-- URL Bar -->
    <rect x="90" y="7" width="460" height="21" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1" />
    <text x="105" y="21" font-size="10" fill="#94a3b8">abroaducate.com/programs/msc-computer-science-tum</text>

    <!-- Platform Brand Inside Browser -->
    <text x="600" y="22" font-size="11" font-weight="800" fill="#f97316" letter-spacing="0.5">🎓 ABROADUCATE</text>

    <!-- Content Workspace -->
    <!-- Course Title Box -->
    <text x="25" y="70" font-size="16" font-weight="800" fill="#ffffff">M.Sc. in Data Engineering &amp; Analytics</text>
    <text x="25" y="87" font-size="11" font-weight="500" fill="#94a3b8">Technical University of Munich (TUM)  •  Germany</text>

    <!-- Tabs Menu -->
    <line x1="25" y1="120" x2="695" y2="120" stroke="#334155" stroke-width="1" />
    
    <!-- Tab 1: Overview -->
    <text x="40" y="112" font-size="11" font-weight="600" fill="#64748b">Overview</text>
    
    <!-- Tab 2: Requirements -->
    <text x="120" y="112" font-size="11" font-weight="600" fill="#64748b">Requirements</text>
    
    <!-- Tab 3: Scholarship Radar (Active) -->
    <text x="230" y="112" font-size="11" font-weight="700" fill="#f97316">Scholarship Radar (3 Matched)</text>
    <!-- Active Indicator Bar -->
    <line x1="220" y1="119" x2="390" y2="119" stroke="#f97316" stroke-width="3" />

    <!-- Tab 4: How to Apply -->
    <text x="415" y="112" font-size="11" font-weight="600" fill="#64748b">How to Apply</text>

    <!-- ================= MATCHED SCHOLARSHIPS CARDS ================= -->
    <!-- Card 1: DAAD -->
    <g transform="translate(25, 140)">
      <rect width="670" height="52" rx="6" fill="#0f172a" stroke="#fb923c" stroke-width="1" />
      <text x="15" y="24" font-size="12" font-weight="700" fill="#ffffff">DAAD Postgraduate Scholarship (TUM-Matched)</text>
      <text x="15" y="40" font-size="9" fill="#94a3b8">Fully funded master's scholarship for developing country applicants.</text>
      
      <!-- Funding Value Tag -->
      <rect x="420" y="16" width="130" height="20" rx="4" fill="#1e293b" />
      <text x="485" y="30" font-size="10" font-weight="700" fill="#f97316" text-anchor="middle">€1,200/mo + Travel</text>
      
      <!-- Match Badge -->
      <rect x="560" y="16" width="85" height="20" rx="4" fill="url(#badgeGrad)" />
      <text x="602" y="29" font-size="9" font-weight="800" fill="#ffffff" text-anchor="middle">98% Match</text>
    </g>

    <!-- Card 2: Deutschlandstipendium -->
    <g transform="translate(25, 202)">
      <rect width="670" height="52" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1" />
      <text x="15" y="24" font-size="12" font-weight="700" fill="#cbd5e1">Deutschlandstipendium at public universities</text>
      <text x="15" y="40" font-size="9" fill="#64748b">National merit scholarship program for highly qualified students.</text>
      
      <!-- Funding Value Tag -->
      <rect x="420" y="16" width="130" height="20" rx="4" fill="#1e293b" />
      <text x="485" y="30" font-size="10" font-weight="600" fill="#cbd5e1" text-anchor="middle">€300 per month</text>
      
      <!-- Match Badge -->
      <rect x="560" y="16" width="85" height="20" rx="4" fill="#1e293b" stroke="#0284c7" stroke-width="1" />
      <text x="602" y="29" font-size="9" font-weight="800" fill="#38bdf8" text-anchor="middle">85% Match</text>
    </g>

    <!-- Card 3: Heinrich Böll Foundation -->
    <g transform="translate(25, 264)">
      <rect width="670" height="52" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1" />
      <text x="15" y="24" font-size="12" font-weight="700" fill="#cbd5e1">Heinrich Böll Foundation Scholarship</text>
      <text x="15" y="40" font-size="9" fill="#64748b">Awards for international students showing academic talent and social engagement.</text>
      
      <!-- Funding Value Tag -->
      <rect x="420" y="16" width="130" height="20" rx="4" fill="#1e293b" />
      <text x="485" y="30" font-size="10" font-weight="600" fill="#cbd5e1" text-anchor="middle">€850/mo + Costs</text>
      
      <!-- Match Badge -->
      <rect x="560" y="16" width="85" height="20" rx="4" fill="#1e293b" stroke="#0284c7" stroke-width="1" />
      <text x="602" y="29" font-size="9" font-weight="800" fill="#38bdf8" text-anchor="middle">90% Match</text>
    </g>
  </g>
</svg>
