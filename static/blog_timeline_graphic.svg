<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" style="background:#0f172a; font-family:'Outfit', 'Inter', 'Segoe UI', sans-serif;">
  <defs>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ea580c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Title -->
  <text x="400" y="45" font-size="22" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="1">
    TYPICAL 12-MONTH APPLICATION TIMELINE
  </text>
  <text x="400" y="68" font-size="12" font-weight="500" fill="#94a3b8" text-anchor="middle">
    Plan your study abroad journey step-by-step to avoid missing key deadlines.
  </text>

  <!-- Timeline Center Horizontal Line -->
  <line x1="60" y1="200" x2="740" y2="200" stroke="#334155" stroke-width="4" />
  <line x1="60" y1="200" x2="520" y2="200" stroke="url(#glowGrad)" stroke-width="4" /> <!-- Current progress colored -->

  <!-- ================= STEP 1 ================= -->
  <!-- Node -->
  <circle cx="100" cy="200" r="14" fill="#1e293b" stroke="#f97316" stroke-width="3" filter="url(#glow)" />
  <text x="100" y="204" font-size="11" font-weight="800" fill="#ffffff" text-anchor="middle">1</text>
  <!-- Timeline Label Top -->
  <text x="100" y="155" font-size="12" font-weight="800" fill="#f97316" text-anchor="middle">12 Months Before</text>
  <rect x="25" y="80" width="150" height="52" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1" />
  <text x="100" y="98" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle">Research Phase</text>
  <text x="100" y="112" font-size="9" fill="#94a3b8" text-anchor="middle">Browse programs &amp;</text>
  <text x="100" y="122" font-size="9" fill="#94a3b8" text-anchor="middle">scholarship options.</text>
  
  <!-- ================= STEP 2 ================= -->
  <!-- Node -->
  <circle cx="240" cy="200" r="14" fill="#1e293b" stroke="#f97316" stroke-width="3" />
  <text x="240" y="204" font-size="11" font-weight="800" fill="#ffffff" text-anchor="middle">2</text>
  <!-- Timeline Label Bottom -->
  <text x="240" y="235" font-size="12" font-weight="800" fill="#f97316" text-anchor="middle">9-10 Months Before</text>
  <rect x="165" y="250" width="150" height="52" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1" />
  <text x="240" y="268" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle">University Apps</text>
  <text x="240" y="282" font-size="9" fill="#94a3b8" text-anchor="middle">Submit documents to</text>
  <text x="240" y="292" font-size="9" fill="#94a3b8" text-anchor="middle">your target programs.</text>

  <!-- ================= STEP 3 ================= -->
  <!-- Node -->
  <circle cx="380" cy="200" r="14" fill="#1e293b" stroke="#f97316" stroke-width="3" />
  <text x="380" y="204" font-size="11" font-weight="800" fill="#ffffff" text-anchor="middle">3</text>
  <!-- Timeline Label Top -->
  <text x="380" y="155" font-size="12" font-weight="800" fill="#f97316" text-anchor="middle">8-9 Months Before</text>
  <rect x="305" y="80" width="150" height="52" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1" />
  <text x="380" y="98" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle">Receive Offers</text>
  <text x="380" y="112" font-size="9" fill="#94a3b8" text-anchor="middle">Get conditional offers or</text>
  <text x="380" y="122" font-size="9" fill="#94a3b8" text-anchor="middle">official admission letters.</text>

  <!-- ================= STEP 4 ================= -->
  <!-- Node -->
  <circle cx="520" cy="200" r="14" fill="#1e293b" stroke="#f97316" stroke-width="3" />
  <text x="520" y="204" font-size="11" font-weight="800" fill="#ffffff" text-anchor="middle">4</text>
  <!-- Timeline Label Bottom -->
  <text x="520" y="235" font-size="12" font-weight="800" fill="#fb923c" text-anchor="middle">6-8 Months Before</text>
  <rect x="445" y="250" width="150" height="52" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1" />
  <text x="520" y="268" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle">Scholarship Apps</text>
  <text x="520" y="282" font-size="9" fill="#94a3b8" text-anchor="middle">Apply for external</text>
  <text x="520" y="292" font-size="9" fill="#94a3b8" text-anchor="middle">scholarships with offer.</text>

  <!-- ================= STEP 5 ================= -->
  <!-- Node -->
  <circle cx="660" cy="200" r="14" fill="#1e293b" stroke="#334155" stroke-width="3" />
  <text x="660" y="204" font-size="11" font-weight="800" fill="#94a3b8" text-anchor="middle">5</text>
  <!-- Timeline Label Top -->
  <text x="660" y="155" font-size="12" font-weight="800" fill="#94a3b8" text-anchor="middle">2-4 Months Before</text>
  <rect x="585" y="80" width="150" height="52" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1" />
  <text x="660" y="98" font-size="11" font-weight="700" fill="#94a3b8" text-anchor="middle">Decision &amp; Visa</text>
  <text x="660" y="112" font-size="9" fill="#64748b" text-anchor="middle">Receive funding decisions,</text>
  <text x="660" y="122" font-size="9" fill="#64748b" text-anchor="middle">then apply for study visa.</text>

  <!-- Flow Direction Arrows -->
  <path d="M190 200 L195 200 M192 196 L196 200 L192 204" fill="none" stroke="#fb923c" stroke-width="2" />
  <path d="M310 200 L315 200 M312 196 L316 200 L312 204" fill="none" stroke="#fb923c" stroke-width="2" />
  <path d="M450 200 L455 200 M452 196 L456 200 L452 204" fill="none" stroke="#fb923c" stroke-width="2" />
  <path d="M590 200 L595 200 M592 196 L596 200 L592 204" fill="none" stroke="#334155" stroke-width="2" />

  <!-- Brand logo overlay -->
  <g transform="translate(350, 360)" opacity="0.3">
    <text x="50" y="12" font-size="11" font-weight="700" fill="#94a3b8" letter-spacing="1">abroaducate.com</text>
  </g>
</svg>
