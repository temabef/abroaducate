<?xml version="1.0" encoding="UTF-8"?>
<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient definitions matching social media covers -->
  <defs>
    <linearGradient id="cleanGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Clean circular background -->
  <circle cx="200" cy="200" r="180" fill="url(#cleanGradient)"/>
  
  <!-- Centered "A" symbol (optimized for readability) -->
  <g transform="translate(140, 110)">
    <!-- Left side of "A" - bold white -->
    <path d="M60 180 L20 180 L50 20 L60 180 Z" fill="white"/>
    <!-- Right side of "A" -->
    <path d="M60 180 L100 180 L70 20 L60 180 Z" fill="rgba(255,255,255,0.9)"/>
    <!-- Top cap -->
    <path d="M70 20 L50 20 L60 10 Z" fill="white"/>
    
    <!-- Bold crossbar for visibility -->
    <polygon points="35,130 85,130 82,120 38,120" fill="white"/>
  </g>
</svg> 