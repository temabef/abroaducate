<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" style="background:#0f172a; font-family:'Outfit', 'Inter', 'Segoe UI', sans-serif;">
  <defs>
    <!-- Brand Gradients -->
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ea580c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="navyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background Grid lines (subtle decoration) -->
  <g opacity="0.03">
    <line x1="100" y1="0" x2="100" y2="450" stroke="#ffffff" stroke-width="1" />
    <line x1="200" y1="0" x2="200" y2="450" stroke="#ffffff" stroke-width="1" />
    <line x1="300" y1="0" x2="300" y2="450" stroke="#ffffff" stroke-width="1" />
    <line x1="400" y1="0" x2="400" y2="450" stroke="#ffffff" stroke-width="1" />
    <line x1="500" y1="0" x2="500" y2="450" stroke="#ffffff" stroke-width="1" />
    <line x1="600" y1="0" x2="600" y2="450" stroke="#ffffff" stroke-width="1" />
    <line x1="700" y1="0" x2="700" y2="450" stroke="#ffffff" stroke-width="1" />
    <line x1="0" y1="100" x2="800" y2="100" stroke="#ffffff" stroke-width="1" />
    <line x1="0" y1="200" x2="800" y2="200" stroke="#ffffff" stroke-width="1" />
    <line x1="0" y1="300" x2="800" y2="300" stroke="#ffffff" stroke-width="1" />
    <line x1="0" y1="400" x2="800" y2="400" stroke="#ffffff" stroke-width="1" />
  </g>

  <!-- Title -->
  <text x="400" y="45" font-size="22" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="1">
    STUDY ABROAD APPLICATION ORDER
  </text>
  <text x="400" y="68" font-size="12" font-weight="500" fill="#94a3b8" text-anchor="middle">
    Getting this order correct saves you months of wasted effort.
  </text>

  <!-- Divider Line -->
  <line x1="400" y1="100" x2="400" y2="410" stroke="#334155" stroke-dasharray="6 4" stroke-width="2" />

  <!-- ================= LEFT COLUMN: EXTERNAL SCHOLARSHIPS ================= -->
  <!-- Header Card Left -->
  <g filter="url(#shadow)">
    <rect x="50" y="100" width="300" height="40" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1" />
    <text x="200" y="125" font-size="13" font-weight="700" fill="#fb923c" text-anchor="middle" letter-spacing="0.5">
      PATH A: EXTERNAL SCHOLARSHIPS
    </text>
  </g>
  <text x="200" y="157" font-size="10" font-weight="500" fill="#64748b" text-anchor="middle">
    Examples: DAAD, Campus France, Deutschlandstipendium
  </text>

  <!-- Flow Steps Left -->
  <!-- Step 1 -->
  <g filter="url(#shadow)" transform="translate(60, 175)">
    <rect x="0" y="0" width="280" height="42" rx="6" fill="#0f172a" stroke="#fb923c" stroke-width="1.5" />
    <circle cx="20" cy="21" r="10" fill="#f97316" />
    <text x="20" y="24" font-size="10" font-weight="800" fill="#ffffff" text-anchor="middle">1</text>
    <text x="45" y="25" font-size="13" font-weight="600" fill="#ffffff">Find Your University Program</text>
  </g>

  <!-- Arrow 1-2 -->
  <g transform="translate(200, 217)">
    <path d="M0 0 L0 10 M-4 6 L0 10 L4 6" fill="none" stroke="#fb923c" stroke-dasharray="3 2" stroke-width="2" />
  </g>

  <!-- Step 2 -->
  <g filter="url(#shadow)" transform="translate(60, 230)">
    <rect x="0" y="0" width="280" height="42" rx="6" fill="#0f172a" stroke="#475569" stroke-width="1" />
    <circle cx="20" cy="21" r="10" fill="#475569" />
    <text x="20" y="24" font-size="10" font-weight="800" fill="#ffffff" text-anchor="middle">2</text>
    <text x="45" y="25" font-size="13" font-weight="600" fill="#cbd5e1">Apply to the Program First</text>
  </g>

  <!-- Arrow 2-3 -->
  <g transform="translate(200, 272)">
    <path d="M0 0 L0 10 M-4 6 L0 10 L4 6" fill="none" stroke="#fb923c" stroke-dasharray="3 2" stroke-width="2" />
  </g>

  <!-- Step 3 -->
  <g filter="url(#shadow)" transform="translate(60, 285)">
    <rect x="0" y="0" width="280" height="42" rx="6" fill="#0f172a" stroke="#475569" stroke-width="1" />
    <circle cx="20" cy="21" r="10" fill="#475569" />
    <text x="20" y="24" font-size="10" font-weight="800" fill="#ffffff" text-anchor="middle">3</text>
    <text x="45" y="25" font-size="13" font-weight="600" fill="#cbd5e1">Secure Offer / Admission Letter</text>
  </g>

  <!-- Arrow 3-4 -->
  <g transform="translate(200, 327)">
    <path d="M0 0 L0 10 M-4 6 L0 10 L4 6" fill="none" stroke="#fb923c" stroke-dasharray="3 2" stroke-width="2" />
  </g>

  <!-- Step 4 -->
  <g filter="url(#shadow)" transform="translate(60, 340)">
    <rect x="0" y="0" width="280" height="42" rx="6" fill="url(#orangeGrad)" />
    <circle cx="20" cy="21" r="10" fill="#ffffff" />
    <text x="20" y="24" font-size="10" font-weight="800" fill="#f97316" text-anchor="middle">4</text>
    <text x="45" y="25" font-size="13" font-weight="700" fill="#ffffff">Apply for External Scholarship</text>
  </g>


  <!-- ================= RIGHT COLUMN: JOINT SCHOLARSHIPS ================= -->
  <!-- Header Card Right -->
  <g filter="url(#shadow)">
    <rect x="450" y="100" width="300" height="40" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1" />
    <text x="600" y="125" font-size="13" font-weight="700" fill="#38bdf8" text-anchor="middle" letter-spacing="0.5">
      PATH B: FULLY FUNDED SCHOLARSHIPS
    </text>
  </g>
  <text x="600" y="157" font-size="10" font-weight="500" fill="#64748b" text-anchor="middle">
    Examples: Erasmus Mundus, Chevening, Eiffel Excellence
  </text>

  <!-- Flow Steps Right -->
  <!-- Step 1 -->
  <g filter="url(#shadow)" transform="translate(460, 175)">
    <rect x="0" y="0" width="280" height="42" rx="6" fill="#0f172a" stroke="#38bdf8" stroke-width="1.5" />
    <circle cx="20" cy="21" r="10" fill="#0284c7" />
    <text x="20" y="24" font-size="10" font-weight="800" fill="#ffffff" text-anchor="middle">1</text>
    <text x="45" y="25" font-size="13" font-weight="600" fill="#ffffff">Find the Joint Scholarship Program</text>
  </g>

  <!-- Arrow R1-R2 -->
  <g transform="translate(600, 227)">
    <path d="M0 0 L0 20 M-4 16 L0 20 L4 16" fill="none" stroke="#38bdf8" stroke-dasharray="3 2" stroke-width="2" />
  </g>

  <!-- Step 2 -->
  <g filter="url(#shadow)" transform="translate(460, 257)">
    <rect x="0" y="0" width="280" height="48" rx="6" fill="url(#navyGrad)" stroke="#38bdf8" stroke-width="1" />
    <circle cx="20" cy="24" r="10" fill="#0284c7" />
    <text x="20" y="27" font-size="10" font-weight="800" fill="#ffffff" text-anchor="middle">2</text>
    <text x="45" y="22" font-size="12" font-weight="700" fill="#ffffff">Apply through Scholarship Portal</text>
    <text x="45" y="37" font-size="9" fill="#94a3b8">The scholarship application IS the program application</text>
  </g>

  <!-- Arrow R2-R3 -->
  <g transform="translate(600, 315)">
    <path d="M0 0 L0 15 M-4 11 L0 15 L4 11" fill="none" stroke="#38bdf8" stroke-dasharray="3 2" stroke-width="2" />
  </g>

  <!-- Step 3 -->
  <g filter="url(#shadow)" transform="translate(460, 340)">
    <rect x="0" y="0" width="280" height="42" rx="6" fill="#0284c7" />
    <circle cx="20" cy="21" r="10" fill="#ffffff" />
    <text x="20" y="24" font-size="10" font-weight="800" fill="#0284c7" text-anchor="middle">3</text>
    <text x="45" y="25" font-size="13" font-weight="700" fill="#ffffff">University Placement is Automatic</text>
  </g>

  <!-- Brand badge -->
  <g transform="translate(350, 422)" opacity="0.4">
    <text x="50" y="12" font-size="10" font-weight="700" fill="#94a3b8" letter-spacing="1">abroaducate.com</text>
  </g>
</svg>
