<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="675" viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="fbBackgroundGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Rectangle -->
  <rect width="1200" height="675" fill="url(#fbBackgroundGradient)" />
  
  <!-- Main Brand -->
  <text x="600" y="120" font-family="Inter, Montserrat, Arial, sans-serif" font-size="48" font-weight="bold" fill="#ffffff" text-anchor="middle">
    🎓 ABROADUCATE
  </text>
  
  <!-- Main Headline -->
  <text x="600" y="180" font-family="Inter, Montserrat, Arial, sans-serif" font-size="36" font-weight="600" fill="#ffffff" text-anchor="middle">
    AI-Powered Academic Applications
  </text>
  
  <!-- Features Row 1 -->
  <text x="300" y="280" font-family="Inter, Montserrat, Arial, sans-serif" font-size="24" font-weight="500" fill="#60a5fa" text-anchor="middle">
    ✨ SOP Generator
  </text>
  
  <text x="600" y="280" font-family="Inter, Montserrat, Arial, sans-serif" font-size="24" font-weight="500" fill="#60a5fa" text-anchor="middle">
    🏛️ University Search
  </text>
  
  <text x="900" y="280" font-family="Inter, Montserrat, Arial, sans-serif" font-size="24" font-weight="500" fill="#60a5fa" text-anchor="middle">
    📚 Scholarships
  </text>
  
  <!-- Features Row 2 -->
  <text x="300" y="340" font-family="Inter, Montserrat, Arial, sans-serif" font-size="24" font-weight="500" fill="#60a5fa" text-anchor="middle">
    🎯 IELTS Practice
  </text>
  
  <text x="600" y="340" font-family="Inter, Montserrat, Arial, sans-serif" font-size="24" font-weight="500" fill="#60a5fa" text-anchor="middle">
    📝 Cover Letters
  </text>
  
  <text x="900" y="340" font-family="Inter, Montserrat, Arial, sans-serif" font-size="24" font-weight="500" fill="#60a5fa" text-anchor="middle">
    🎓 Academic CV
  </text>
  
  <!-- Call to Action -->
  <text x="600" y="450" font-family="Inter, Montserrat, Arial, sans-serif" font-size="28" font-weight="500" fill="#ffffff" text-anchor="middle">
    Join Students Worldwide → abroaducate.com
  </text>
  
  <!-- Decorative Background Elements -->
  <circle cx="150" cy="150" r="40" fill="rgba(255,255,255,0.05)" />
  <circle cx="1050" cy="200" r="30" fill="rgba(255,255,255,0.08)" />
  <circle cx="100" cy="500" r="25" fill="rgba(255,255,255,0.06)" />
  <circle cx="1100" cy="550" r="35" fill="rgba(255,255,255,0.04)" />
  
  <!-- Academic Pattern Elements -->
  <g transform="translate(80, 400)" opacity="0.1">
    <!-- Book Icon -->
    <path d="M18,22A2,2 0 0,0 20,20V4A2,2 0 0,0 18,2H12V9L9.5,7.5L7,9V2H6A2,2 0 0,0 4,4V20A2,2 0 0,0 6,22H18Z" fill="#ffffff"/>
  </g>
  
  <g transform="translate(1050, 450)" opacity="0.08">
    <!-- Globe/University Icon -->
    <circle cx="12" cy="12" r="10" stroke="#ffffff" stroke-width="2" fill="none"/>
    <path d="M2,12 C2,12 8,6 12,12 C12,12 18,6 22,12" stroke="#ffffff" stroke-width="2" fill="none"/>
    <path d="M2,12 C2,12 8,18 12,12 C12,12 18,18 22,12" stroke="#ffffff" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Subtle Connecting Lines -->
  <line x1="200" y1="280" x2="400" y2="280" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
  <line x1="700" y1="280" x2="800" y2="280" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
  <line x1="200" y1="340" x2="400" y2="340" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
  <line x1="700" y1="340" x2="800" y2="340" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
</svg> 