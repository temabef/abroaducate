    <circle cx="12" cy="12" r="10" stroke="#ffffff" stroke-width="2" fill="none"/>
    <path d="M2,12 C2,12 8,6 12,12 C12,12 18,6 22,12" stroke="#ffffff" stroke-width="2" fill="none"/>
    <path d="M2,12 C2,12 8,18 12,12 C12,12 18,18 22,12" stroke="#ffffff" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Corner Accent Elements -->
  <circle cx="100" cy="100" r="30" fill="rgba(255,255,255,0.08)" />
  <circle cx="980" cy="100" r="25" fill="rgba(255,255,255,0.06)" />
  <circle cx="100" cy="980" r="35" fill="rgba(255,255,255,0.05)" />
  <circle cx="980" cy="980" r="20" fill="rgba(255,255,255,0.07)" />
</svg> 