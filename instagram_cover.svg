<?xml version="1.0" encoding="UTF-8"?>
<svg width="1080" height="1080" viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient Background -->
  <defs>
    <radialGradient id="instagramBackgroundGradient" cx="50%" cy="30%" r="80%">
      <stop offset="0%" style="stop-color:#764ba2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <!-- Background Rectangle -->
  <rect width="1080" height="1080" fill="url(#instagramBackgroundGradient)" />
  
  <!-- Central Decorative Circle -->
  <circle cx="540" cy="540" r="400" stroke="rgba(255,255,255,0.1)" stroke-width="2" fill="none"/>
  <circle cx="540" cy="540" r="300" stroke="rgba(255,255,255,0.08)" stroke-width="2" fill="none"/>
  <circle cx="540" cy="540" r="200" stroke="rgba(255,255,255,0.06)" stroke-width="2" fill="none"/>
  
  <!-- Main Brand -->
  <text x="540" y="220" font-family="Inter, Montserrat, Arial, sans-serif" font-size="56" font-weight="bold" fill="#ffffff" text-anchor="middle">
    🎓 ABROADUCATE
  </text>
  
  <!-- Main Headline -->
  <text x="540" y="320" font-family="Inter, Montserrat, Arial, sans-serif" font-size="32" font-weight="600" fill="#ffffff" text-anchor="middle">
    AI-Powered Academic
  </text>
  
  <text x="540" y="370" font-family="Inter, Montserrat, Arial, sans-serif" font-size="32" font-weight="600" fill="#ffffff" text-anchor="middle">
    Applications
  </text>
  
  <!-- Features in a Circular Layout -->
  <text x="540" y="480" font-family="Inter, Montserrat, Arial, sans-serif" font-size="26" font-weight="500" fill="#60a5fa" text-anchor="middle">
    ✨ SOP Generator
  </text>
  
  <text x="540" y="530" font-family="Inter, Montserrat, Arial, sans-serif" font-size="26" font-weight="500" fill="#60a5fa" text-anchor="middle">
    🏛️ University Search
  </text>
  
  <text x="540" y="580" font-family="Inter, Montserrat, Arial, sans-serif" font-size="26" font-weight="500" fill="#60a5fa" text-anchor="middle">
    📚 Scholarships
  </text>
  
  <text x="540" y="630" font-family="Inter, Montserrat, Arial, sans-serif" font-size="26" font-weight="500" fill="#60a5fa" text-anchor="middle">
    🎯 IELTS Practice
  </text>
  
  <!-- Website -->
  <text x="540" y="800" font-family="Inter, Montserrat, Arial, sans-serif" font-size="28" font-weight="500" fill="#ffffff" text-anchor="middle">
    abroaducate.com
  </text>
  
  <!-- Decorative Academic Elements Around the Circle -->
  <g transform="translate(200, 200)" opacity="0.15">
    <!-- Book Icon -->
    <path d="M18,22A2,2 0 0,0 20,20V4A2,2 0 0,0 18,2H12V9L9.5,7.5L7,9V2H6A2,2 0 0,0 4,4V20A2,2 0 0,0 6,22H18Z" fill="#ffffff"/>
  </g>
  
  <g transform="translate(800, 250)" opacity="0.12">
    <!-- Diploma Icon -->
    <path d="M9,3V18L15,15L21,18V3H9M7,1H23A1,1 0 0,1 24,2V20A1,1 0 0,1 23,21H7A1,1 0 0,1 6,20V2A1,1 0 0,1 7,1Z" fill="#ffffff"/>
  </g>
  
  <g transform="translate(150, 700)" opacity="0.1">
    <!-- University/Building Icon -->
    <path d="M12,3L1,9L5,11.18V17.18L12,21L19,17.18V11.18L21,10.09V17H23V9L12,3M18.82,9L12,12.72L5.18,9L12,5.28L18.82,9M17,15.99L12,18.72L7,15.99V12.27L12,15L17,12.27V15.99Z" fill="#ffffff"/>
  </g>
  
  <g transform="translate(820, 700)" opacity="0.08">
